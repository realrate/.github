name: Dependabot Auto-Merge

# Org-wide Dependabot auto-merge. This workflow is referenced by the org
# `dependabot-automerge` ruleset ("Require workflows to pass before merging"),
# which INJECTS and runs it on Dependabot PRs across every targeted repo — so
# individual repos do NOT need their own copy or a caller. GitHub requires the
# referenced workflow to be directly PR-triggerable (pull_request_target /
# pull_request / merge_queue); it must NOT be a reusable (workflow_call) workflow.
#
# Patch/minor bumps are approved and CI-gate-merged. EVERY major bump (any
# ecosystem -- github-actions, uv/pip, docker -- in every repo) gets an AI risk
# verdict (GitHub Models) and is auto-merged if judged low-risk/non-breaking,
# else commented + labeled `needs-manual-review` for a human. The ecosystem is a
# hint to the classifier, not a gate, so it adapts to whatever fetch-metadata
# reports (this repo uses `uv` for Python, not `pip`).
#
# Every auto-merge (patch/minor AND AI-approved majors) goes through
# review-tooling/gated_merge.sh, which waits for the PR's own CI checks to finish
# and merges only if they all pass -- otherwise it routes to manual review. This
# replaces `gh pr merge --auto` (which only waits for *required* status checks):
# because this workflow is injected across repos whose checks are named
# differently or absent, we cannot express "tests must pass" as a per-repo
# required check, so the script reads the PR's actual check conclusions instead.
# A failed test therefore blocks the merge even where no required checks exist.
# See RealRate-Private#2229 (AI gate) and #2244 (CI gate).

on:
  pull_request_target:
    types: [opened, synchronize]

# One in-flight run per PR. A new event (e.g. a rebase/synchronize) cancels the
# previous run so two runs never wait on CI and race to merge the same PR.
concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read # GitHub Models inference for the major-bump AI risk gate

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    env:
      # AI-gated auto-merge of MAJOR bumps, in every repo the shared workflow is
      # injected into (RealRate-Private#2229).
      # AIGATE_DRY_RUN=true posts the AI verdict as a comment but does NOT merge;
      # =false enforces (verdict=auto -> approve + gated auto-merge).
      # Shipping in OBSERVE mode (true): watch the AI verdicts on real major bumps
      # -- especially uv/Python, where our tests have known blind spots -- then
      # flip to "false" to enforce. patch/minor auto-merge + the CI gate are
      # unaffected by this flag.
      AIGATE_DRY_RUN: "true"
      # CI gate (RealRate-Private#2244): when "true", auto-merges wait for the
      # PR's checks to pass before merging. Set "false" as a kill switch to fall
      # back to GitHub-native `--auto` (waits only for *required* checks).
      CI_GATE_ENABLED: "true"
    # Guard on the PR author rather than github.actor (the triggering user,
    # which can be a maintainer on a rebase/synchronize of the Dependabot branch).
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Our own org tooling (gated_merge.sh + the AI review script). Pinned ref,
      # NOT the PR head -- pull_request_target runs with write perms, so we never
      # check out untrusted bump code. Used by every auto-merge path below.
      - name: Check out merge tooling
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: realrate/.github
          path: _tooling

      - name: Approve PR
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch/minor bump (gated on CI)
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: bash _tooling/.github/review-tooling/gated_merge.sh
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_GATE_ENABLED: ${{ env.CI_GATE_ENABLED }}
          MERGE_METHOD: rebase

      # ---------------------------------------------------------------------------
      # AI risk gate for EVERY MAJOR bump (any ecosystem, every repo).
      # Runs once, on `opened` (the dependency/version is fixed for the PR's life,
      # so re-evaluating on every synchronize would only add noise). The verdict
      # step is read-only and NEVER merges; a separate deterministic step acts on
      # the verdict. We do NOT check out the PR head code -- the untrusted changelog
      # is only classified. Inference uses GitHub Models via the built-in token (no
      # external secret); on any failure the script emits verdict=human, so we never
      # auto-merge on an errored verdict.
      # ---------------------------------------------------------------------------
      - name: AI risk verdict for major bump
        id: aiverdict
        continue-on-error: true # a failed verdict must fall through to manual review, not fail the required check
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          github.event.action == 'opened'
        env:
          # Inference runs on GitHub Models via the built-in token (`models: read`);
          # no external API key. GITHUB_TOKEN also authenticates the `gh` calls below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # gpt-4.1 is the strongest model actually available for GitHub Models
          # inference (gpt-5* are cataloged but return `unavailable_model`).
          MODEL_ID: openai/gpt-4.1
          PR_URL: ${{ github.event.pull_request.html_url }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
        run: |
          python3 -m pip install --quiet --disable-pip-version-check -r _tooling/.github/review-tooling/requirements.txt
          gh pr view "$PR_URL" --json title --jq .title > pr_title.txt
          gh pr view "$PR_URL" --json body  --jq '.body // ""' > pr_body.txt
          python3 _tooling/.github/review-tooling/review_dependabot_major.py \
            --title-file pr_title.txt --body-file pr_body.txt \
            --dep-names "$DEP_NAMES" --ecosystem "$ECOSYSTEM" --out verdict.json
          {
            echo "verdict=$(jq -r .verdict verdict.json)"
            echo "reason=$(jq -r .reason verdict.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Auto-merge major bump (verdict=auto, gated on CI)
        if: |
          steps.aiverdict.outcome == 'success' &&
          steps.aiverdict.outputs.verdict == 'auto' &&
          env.AIGATE_DRY_RUN != 'true'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASON: ${{ steps.aiverdict.outputs.reason }}
          CI_GATE_ENABLED: ${{ env.CI_GATE_ENABLED }}
          MERGE_METHOD: rebase
        run: |
          gh pr comment "$PR_URL" --body "🤖 **AI risk gate: auto-merge.** ${REASON} CI checks must still pass before the merge completes."
          gh pr review --approve "$PR_URL"
          bash _tooling/.github/review-tooling/gated_merge.sh

      - name: Route major bump to human (not auto-merged)
        # Runs for every major bump that is NOT being auto-merged: verdict=human,
        # dry-run, or a failed/empty verdict. Adds the same needs-manual-review label.
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          github.event.action == 'opened' &&
          !(steps.aiverdict.outcome == 'success' && steps.aiverdict.outputs.verdict == 'auto' && env.AIGATE_DRY_RUN != 'true')
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERDICT: ${{ steps.aiverdict.outputs.verdict }}
          REASON: ${{ steps.aiverdict.outputs.reason }}
          DRY_RUN: ${{ env.AIGATE_DRY_RUN }}
        run: |
          if [ -z "$VERDICT" ]; then
            body="🤖 **AI risk gate: unavailable** — routed to manual review."
          elif [ "$DRY_RUN" = "true" ] && [ "$VERDICT" = "auto" ]; then
            body="🤖 **AI risk gate: auto** _(dry-run — auto-merge disabled; observing)._ ${REASON} Left for manual review."
          else
            body="🤖 **AI risk gate: ${VERDICT}.** ${REASON} Left for manual review."
          fi
          gh pr comment "$PR_URL" --body "$body"
          gh label create needs-manual-review --color FBCA04 \
            --description "Dependabot major bump — needs manual review before merge" 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label "needs-manual-review" || true
